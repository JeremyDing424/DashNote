<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Markdown 转换器测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .panel {
      border: 2px solid #1a1a1a;
      border-radius: 8px;
      padding: 20px;
    }
    h2 {
      margin-top: 0;
    }
    textarea {
      width: 100%;
      height: 300px;
      font-family: monospace;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .preview {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 10px;
      min-height: 300px;
      background: #fafafa;
    }
    button {
      padding: 10px 20px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <h1>Markdown 转换器测试</h1>

  <div class="container">
    <div class="panel">
      <h2>Markdown → HTML</h2>
      <textarea id="markdownInput" placeholder="输入 Markdown..."># 标题 1

## 标题 2

这是一段**粗体**和*斜体*文本。

- 列表项 1
- 列表项 2

`行内代码`</textarea>
      <button onclick="testMarkdownToHtml()">转换为 HTML</button>
      <h3>结果：</h3>
      <div class="preview" id="htmlOutput"></div>
    </div>

    <div class="panel">
      <h2>HTML → Markdown</h2>
      <div class="preview" contenteditable="true" id="htmlInput">
        <h1>标题 1</h1>
        <h2>标题 2</h2>
        <p>这是一段<strong>粗体</strong>和<em>斜体</em>文本。</p>
        <ul>
          <li>列表项 1</li>
          <li>列表项 2</li>
        </ul>
        <p><code>行内代码</code></p>
      </div>
      <button onclick="testHtmlToMarkdown()">转换为 Markdown</button>
      <h3>结果：</h3>
      <textarea id="markdownOutput" readonly></textarea>
    </div>
  </div>

  <script src="markdown-converter.js"></script>
  <script>
    function testMarkdownToHtml() {
      const markdown = document.getElementById('markdownInput').value;
      const html = MarkdownConverter.markdownToHtml(markdown);
      document.getElementById('htmlOutput').innerHTML = html;
      console.log('Markdown → HTML:', html);
    }

    function testHtmlToMarkdown() {
      const html = document.getElementById('htmlInput').innerHTML;
      const markdown = MarkdownConverter.htmlToMarkdown(html);
      document.getElementById('markdownOutput').value = markdown;
      console.log('HTML → Markdown:', markdown);
    }

    // 初始化测试
    testMarkdownToHtml();
  </script>
</body>
</html>
