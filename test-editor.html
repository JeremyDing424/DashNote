<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Toast UI Editor 测试</title>
  <link rel="stylesheet" href="libs/toastui-editor.min.css">
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }
    #editor {
      height: 600px;
    }
    .info {
      margin-bottom: 20px;
      padding: 15px;
      background: #f0f0f0;
      border-radius: 8px;
    }
    .info h2 {
      margin-top: 0;
    }
    .info ul {
      margin: 10px 0;
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <div class="info">
    <h2>Toast UI Editor 测试页面</h2>
    <p><strong>测试项目：</strong></p>
    <ul>
      <li>工具栏图标是否正常显示</li>
      <li>输入 <code># 标题</code> 是否能正常渲染</li>
      <li>左侧编辑，右侧预览是否正常</li>
    </ul>
    <p><strong>测试方法：</strong></p>
    <ul>
      <li>在左侧编辑区输入：<code># 这是标题</code></li>
      <li>查看右侧预览区是否显示为标题格式</li>
      <li>点击工具栏按钮测试功能</li>
    </ul>
  </div>

  <div id="editor"></div>

  <script src="libs/toastui-editor-all.min.js"></script>
  <script>
    const editor = new toastui.Editor({
      el: document.querySelector('#editor'),
      height: '600px',
      initialEditType: 'markdown',
      previewStyle: 'vertical',
      initialValue: '# 测试标题\n\n这是一段测试文本。\n\n## 二级标题\n\n- 列表项 1\n- 列表项 2\n\n**粗体文本** 和 *斜体文本*',
      toolbarItems: [
        ['heading', 'bold', 'italic', 'strike'],
        ['hr', 'quote'],
        ['ul', 'ol', 'task'],
        ['table', 'link'],
        ['code', 'codeblock']
      ]
    });

    console.log('编辑器初始化完成');
    console.log('工具栏元素:', document.querySelector('.toastui-editor-toolbar'));
  </script>
</body>
</html>
